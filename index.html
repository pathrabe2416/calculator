<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Classic Calculator</title>
<link rel="stylesheet" href="cal.css" />
</head>
<body>

<div class="app-wrapper">

  <!-- ===================== DEVICE ===================== -->
  <div class="device">

    <div class="screen-bezel">
      <div class="brand">Classic Calculator</div>
      <div class="screen">
        <div class="expr" id="exprLine">&nbsp;</div>
        <div class="result" id="resultLine">0</div>
      </div>
    </div>

    <div class="nav-row">
      <button class="nav-btn" id="navMenu" data-nav="menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
        <span>Menu</span>
      </button>
      <button class="nav-btn" id="navHistory" data-nav="history">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l3 2"/><path d="M5 3 3 5"/></svg>
        <span>History</span>
      </button>
      <button class="nav-btn" id="navConverter" data-nav="converter">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 7h13l-3-3"/><path d="M20 7 17 10"/><path d="M17 17H4l3 3"/><path d="M4 17l3-3"/></svg>
        <span>Converter</span>
      </button>
      <button class="nav-btn" id="navScientific" data-nav="scientific">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3v6l-5.5 9.5A2 2 0 0 0 5.2 21h13.6a2 2 0 0 0 1.7-2.5L15 9V3"/><line x1="9" y1="3" x2="15" y2="3"/><line x1="8" y1="14" x2="16" y2="14"/></svg>
        <span>Scientific</span>
      </button>
      <button class="nav-btn" id="navSettings" data-nav="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 0 1-4 0v-.09a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.55-1H3a2 2 0 0 1 0-4h.09a1.7 1.7 0 0 0 1.55-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34H9a1.7 1.7 0 0 0 1-1.55V3a2 2 0 0 1 4 0v.09a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87V9a1.7 1.7 0 0 0 1.55 1H21a2 2 0 0 1 0 4h-.09a1.7 1.7 0 0 0-1.55 1z"/></svg>
        <span>Settings</span>
      </button>
    </div>

    <div class="keys">
      <!-- row 1: memory + clear -->
      <button class="key dark" data-mem="MC">MC</button>
      <button class="key dark" data-mem="MR">MR</button>
      <button class="key dark" data-mem="M+">M+</button>
      <button class="key dark" data-mem="M-">M-</button>
      <button class="key dark" data-mem="MS">MS</button>
      <button class="key red" data-action="clear">C</button>

      <!-- row 2 -->
      <button class="key dark" data-action="sign">+/-</button>
      <button class="key dark" data-action="percent">%</button>
      <button class="key light" data-num="7">7</button>
      <button class="key light" data-num="8">8</button>
      <button class="key light" data-num="9">9</button>
      <button class="key dark" data-op="÷">÷</button>

      <!-- row 3 -->
      <button class="key dark" data-fn="sqrt">√</button>
      <button class="key dark key-fn" data-fn="sq">x²</button>
      <button class="key light" data-num="4">4</button>
      <button class="key light" data-num="5">5</button>
      <button class="key light" data-num="6">6</button>
      <button class="key dark" data-op="×">×</button>

      <!-- row 4 -->
      <button class="key dark" data-action="ce">CE</button>
      <button class="key dark key-fn" data-fn="pow">x^y</button>
      <button class="key light" data-num="1">1</button>
      <button class="key light" data-num="2">2</button>
      <button class="key light" data-num="3">3</button>
      <button class="key dark" data-op="−">−</button>

      <!-- row 5 -->
      <button class="key dark key-zero" data-num="0">0</button>
      <button class="key light" data-num=".">.</button>
      <button class="key dark key-equals" data-action="equals">=</button>
      <button class="key dark" data-op="+">+</button>
    </div>

  </div>

  <!-- ===================== EXTRA PANEL ===================== -->
  <div class="panel-content extra-panel" id="extraPanel">
    <div class="panel-head">
      <strong id="panelTitle">Menu</strong>
    </div>

    <!-- Menu -->
    <div class="section" id="section-menu">
      <div class="section-head"><h3>Menu</h3></div>
      <div class="menu-list">
        <button class="menu-item" data-goto="theme">
          <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 2a10 10 0 1 0 0 20V2z"/></svg>
          Appearance
        </button>
        <button class="menu-item" data-goto="scientific">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3v6l-5.5 9.5A2 2 0 0 0 5.2 21h13.6a2 2 0 0 0 1.7-2.5L15 9V3"/><line x1="9" y1="3" x2="15" y2="3"/></svg>
          Scientific mode
        </button>
        <button class="menu-item" data-goto="converter">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 7h13l-3-3"/><path d="M20 7 17 10"/><path d="M17 17H4l3 3"/></svg>
          Unit converter
        </button>
        <button class="menu-item" data-goto="history">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l3 2"/></svg>
          Calculation history
        </button>
        <button class="menu-item" data-goto="settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          Settings
        </button>
      </div>
    </div>

    <!-- Appearance / Theme -->
    <div class="section" id="section-theme">
      <div class="section-head"><h3>Appearance</h3></div>
      <div class="theme-grid">
        <button class="theme-card" data-theme-option="light">
          <div class="theme-swatch light"><span></span></div>
          <div class="theme-info">
            <strong>Classic White</strong>
            <small>Warm cream body, olive screen</small>
          </div>
          <div class="theme-check">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
        </button>
        <button class="theme-card" data-theme-option="dark">
          <div class="theme-swatch dark"><span></span></div>
          <div class="theme-info">
            <strong>Classic Black</strong>
            <small>Matte black body, charcoal screen</small>
          </div>
          <div class="theme-check">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
        </button>
      </div>
    </div>

    <!-- Scientific -->
    <div class="section" id="section-scientific">
      <div class="section-head">
        <h3>Scientific</h3>
      </div>
      <div class="mode-toggle">
        <button id="modeDeg" class="active">DEG</button>
        <button id="modeRad">RAD</button>
      </div>
      <div class="sci-grid">
        <button data-fn="sin">sin</button>
        <button data-fn="cos">cos</button>
        <button data-fn="tan">tan</button>
        <button data-fn="log">log</button>
        <button data-fn="ln">ln</button>
        <button data-fn="pow">x^y</button>
        <button data-fn="sqrt">√</button>
        <button data-fn="sq">x²</button>
        <button data-fn="cube">x³</button>
        <button data-fn="inv">1/x</button>
        <button data-fn="abs">|x|</button>
        <button data-fn="pi">π</button>
        <button data-fn="e">e</button>
        <button data-fn="open">(</button>
        <button data-fn="close">)</button>
      </div>
    </div>

    <!-- Converter -->
    <div class="section" id="section-converter">
      <div class="section-head"><h3>Converter</h3></div>
      <select class="conv-select" id="convCategory"></select>

      <div class="conv-row">
        <div class="conv-field">
          <input type="text" id="convFromValue" value="1" inputmode="decimal" />
          <select id="convFromUnit"></select>
        </div>
        <button class="swap-btn" id="convSwap" title="Swap units" aria-label="Swap units">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 7h13l-3-3"/><path d="M20 7 17 10"/><path d="M17 17H4l3 3"/><path d="M4 17l3-3"/></svg>
        </button>
      </div>
      <div class="conv-eq">=</div>
      <div class="conv-row">
        <div class="conv-field">
          <input type="text" id="convToValue" readonly />
          <select id="convToUnit"></select>
        </div>
        <div style="width:40px;flex-shrink:0;"></div>
      </div>
    </div>

    <!-- History -->
    <div class="section" id="section-history">
      <div class="section-head">
        <h3>History</h3>
        <button class="link-btn" id="clearHistory">Clear</button>
      </div>
      <div class="history-list" id="historyList">
        <div class="history-empty">No calculations yet</div>
      </div>
    </div>

    <!-- Settings -->
    <div class="section" id="section-settings">
      <div class="section-head"><h3>Settings</h3></div>
      <div class="settings-group">
        <div class="settings-row">
          <span>Angle mode</span>
          <div class="mode-toggle" style="margin:0;flex:0 0 auto;width:140px;">
            <button id="settingsDeg" class="active">DEG</button>
            <button id="settingsRad">RAD</button>
          </div>
        </div>
        <div class="settings-row">
          <span>Theme</span>
          <button id="settingsThemeGoto">Appearance</button>
        </div>
        <div class="settings-row">
          <span>Clear memory</span>
          <button id="clearMemory">Clear M</button>
        </div>
        <div class="settings-row">
          <span>Clear history</span>
          <button id="clearHistorySettings" class="danger">Clear</button>
        </div>
        <div class="settings-row">
          <span>Reset calculator</span>
          <button id="resetCalc" class="danger">Reset</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="cal.js"></script>
</body>
</html>
